# model_config.yaml — 舊版單影片模式設定
#
# 供 src/pipeline/run_inference.py 使用（backward compat）。
# 新版多流架構請使用 cameras.yaml。
#
# 可用測試影片（data/test_videos/metro/）：
#   IMG_2661  IMG_2698  IMG_2727  IMG_2728  IMG_2729
#   IMG_2730  IMG_2731  IMG_2732  IMG_2733  IMG_2734
#   IMG_2740  IMG_2741  IMG_2742  IMG_2743  IMG_2744
#   IMG_2745  IMG_2746  IMG_2747  IMG_2748  IMG_2749
#   IMG_2750  IMG_2751

video:
  test_dir:      "data/test_videos/metro"
  target:        "IMG_2733.MOV"    # 留空或 null 批次處理 test_dir 所有影片
  output_dir:    "outputs/videos"
  display_scale: 0.5               # 預覽視窗縮放比例

luggage:
  weight:                  "models/luggage/yolo_luggage_best.pt"
  conf:                    0.4
  size_method:             "person_ratio"   # person_ratio（主）/ frame_ratio（備援）
  large_person_area_ratio: 0.22             # 行李面積/人體面積 ≥ 此值 → 大件
  max_match_distance_px:   400
  large_area_ratio:        0.01             # frame_ratio 備援門檻

fall_detection:
  weight:              "models/fall_detection/yolo12l.pt"
  conf:                0.4
  fallen_aspect_ratio: 1.2    # bbox 寬/高 > 此值視為橫倒
  alert_frames:        5
  clahe:               true   # CLAHE 對比增強（暗區建議開）
  gamma:               0.5    # <1 提亮，1.0=關閉
  imgsz:               1280

pose_fallback:
  enabled:        false
  mode:           "balanced"  # lightweight / balanced / performance
  kp_conf:        0.3
  min_kp:         3
  fall_angle_deg: 50.0
  device:         "cpu"
